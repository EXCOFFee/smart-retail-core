# ============================================================================
# SMART_RETAIL - Docker Compose para Desarrollo Local
# ============================================================================
# Levanta los servicios de infraestructura necesarios para desarrollo:
# - PostgreSQL 17 (Base de datos principal)
# - Redis 7 (Cache de stock y locks)
# - Adminer (GUI para Postgres)
# - RedisInsight (GUI para Redis)
#
# Uso: docker compose up -d
# ============================================================================

services:
  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL 17 - Base de Datos Principal
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: smart-retail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartRetail
      POSTGRES_PASSWORD: smart_retail_secret_2026
      POSTGRES_DB: smart_retail_db
      # Mejora el rendimiento para desarrollo
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      # Persistencia de datos entre reinicios
      - postgres_data:/var/lib/postgresql/data
      # Scripts de inicialización (ejecutados en orden alfabético)
      - ./docker/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartRetail -d smart_retail_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-retail-network

  # ─────────────────────────────────────────────────────────────────────────
  # Redis 7 - Cache de Stock y Distributed Locks
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smart-retail-redis
    restart: unless-stopped
    # Configuración optimizada para baja latencia
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-retail-network

  # ─────────────────────────────────────────────────────────────────────────
  # Adminer - GUI Web para PostgreSQL
  # Por qué: Facilita debugging y exploración de datos en desarrollo
  # Acceso: http://localhost:8080
  # ─────────────────────────────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: smart-retail-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    depends_on:
      - postgres
    networks:
      - smart-retail-network

  # ─────────────────────────────────────────────────────────────────────────
  # RedisInsight - GUI para Redis
  # Por qué: Visualizar keys, locks y debugging de cache
  # Acceso: http://localhost:5540
  # ─────────────────────────────────────────────────────────────────────────
  redis-insight:
    image: redis/redisinsight:latest
    container_name: smart-retail-redis-insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/data
    depends_on:
      - redis
    networks:
      - smart-retail-network

# ─────────────────────────────────────────────────────────────────────────────
# Volumes - Persistencia de datos
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: smart-retail-postgres-data
  redis_data:
    name: smart-retail-redis-data
  redis_insight_data:
    name: smart-retail-redis-insight-data

# ─────────────────────────────────────────────────────────────────────────────
# Networks - Red interna para comunicación entre servicios
# ─────────────────────────────────────────────────────────────────────────────
networks:
  smart-retail-network:
    name: smart-retail-network
    driver: bridge
